<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="icon" type="image/svg+xml" href="img/favicon-dark.svg" id="favicon-link">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>

<body class="dark">
    <div class="container">
        <header class="header">
            <div class="header-left">
                <div class="header-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z">
                        </path>
                    </svg>
                </div>
                <div class="header-title">
                    <h1></h1>
                    <p></p>
                    <p id="header-class-info"></p>
                </div>
            </div>
            <div class="header-right">
                <div id="user-greeting" class="user-greeting hidden">
                    <span class="user-name"></span>
                    <span class="user-email"></span>
                </div>
                <div class="score-box">
                    <span class="indicator"></span>
                    <span id="score-counter">0</span>
                    <span class="label">Aciertos</span>
                </div>
                <button id="theme-toggle" class="theme-toggle" title="Cambiar tema">
                    <svg id="moon-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z">
                        </path>
                    </svg>
                    <svg id="sun-icon" class="hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
                        </path>
                    </svg>
                </button>
            </div>
        </header>

        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <main id="registration-screen" class="content registration">
            <div class="registration-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z">
                    </path>
                </svg>
            </div>
            <h2>Bienvenido al Quiz</h2>
            <p>Ingresa tus datos para comenzar</p>
            <form id="user-form" class="user-form">
                <div class="form-group">
                    <label for="user-name">Nombre completo</label>
                    <input type="text" id="user-name" placeholder="Tu nombre" required>
                </div>
                <div class="form-group">
                    <label for="user-email">Email institucional</label>
                    <input type="email" id="user-email" placeholder="nombre@stbrendans.edu.ar" required>
                </div>
                <p id="form-error" class="form-error hidden"></p>
                <button type="submit" class="btn">Comenzar Quiz</button>
            </form>
        </main>

        <main id="welcome-screen" class="content welcome">
            <div class="welcome-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
                    </path>
                </svg>
            </div>
            <h2></h2>
            <p></p>
            <button id="start-btn" class="btn">Comenzar Quiz</button>
        </main>

        <main id="quiz-screen" class="content quiz">
            <div class="quiz-header">
                <span id="question-indicator" class="question-indicator">Pregunta 1 de 10</span>
                <button id="hint-btn" class="hint-btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    Ver Pista
                </button>
            </div>

            <div id="hint-box" class="hint-box">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z">
                    </path>
                </svg>
                <div>
                    <span>Pista útil</span>
                    <p id="hint-text"></p>
                </div>
            </div>

            <h3 id="question-text" class="question-text"></h3>

            <div id="options-container" class="options"></div>

            <div class="quiz-footer">
                <div class="quiz-footer-left">
                    <div id="timer-container" class="timer-container hidden">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span id="timer">00:00</span>
                    </div>
                    <div id="current-score" class="current-score hidden">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span id="score-display">0/0</span>
                    </div>
                </div>
                <button id="next-btn" class="btn" disabled>
                    <span>Comprobar respuesta</span>
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
                <button id="user-menu-btn" class="user-menu-btn" title="Menú de usuario">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </button>
            </div>
        </main>

        <main id="result-screen" class="content results">
            <div id="diploma-card" class="diploma-card">
                <div class="diploma-header">
                    <div class="diploma-corner top-left"></div>
                    <div class="diploma-corner top-right"></div>
                    <div class="diploma-icon" id="diploma-icon"></div>
                    <h3 class="diploma-heading">Diploma Digital</h3>
                    <div class="diploma-level" id="diploma-level">
                        <span class="diploma-level-icon" id="diploma-level-icon"></span>
                        <span class="diploma-level-label" id="diploma-level-label"></span>
                    </div>
                </div>
                <div class="diploma-body">
                    <span class="diploma-awarded">Otorgado a</span>
                    <h2 class="diploma-name" id="diploma-name"></h2>
                    <span class="diploma-for">Por completar</span>
                    <p class="diploma-quiz-title" id="diploma-quiz-title"></p>
                    <h4 class="diploma-result-title" id="diploma-result-title"></h4>
                    <p class="diploma-message" id="diploma-message"></p>
                    <div class="diploma-score" id="diploma-score"></div>
                    <div class="diploma-meta">
                        <span class="diploma-meta-item">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="12" height="12">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                            <span id="diploma-date"></span>
                        </span>
                    </div>
                </div>
                <div class="diploma-footer">
                    <span class="diploma-achievements-title">Logros</span>
                    <div class="diploma-achievements" id="diploma-achievements"></div>
                </div>
            </div>

            <div class="results-footer">
                <!-- <button id="share-diploma-btn" class="btn btn-share">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path>
                    </svg>
                    <span id="share-btn-text">Compartir Diploma</span>
                </button> -->
                <button id="user-menu-btn-results" class="user-menu-btn hidden" title="Ver historial">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </button>
                <button id="restart-btn" class="btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                        class="bi bi-arrow-repeat" viewBox="0 0 16 16">
                        <path
                            d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41m-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9" />
                        <path fill-rule="evenodd"
                            d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.9A5 5 0 0 0 8 3M3.1 9a5.002 5.002 0 0 0 8.757 2.182.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9z" />
                    </svg>
                    Reintentar Quiz
                </button>
            </div>
        </main>
    </div>

    <div id="user-dialog" class="user-dialog hidden">
        <div class="dialog-overlay"></div>
        <div class="dialog-content">
            <button id="close-dialog" class="close-dialog" title="Cerrar">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
            <div class="dialog-header">
                <div class="dialog-user-avatar">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </div>
                <h3 id="dialog-user-name"></h3>
                <p id="dialog-user-email"></p>
            </div>
            <div class="dialog-body">
                <button id="reset-user-btn" class="dialog-btn">
                    <!-- <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 15H18"></path>
                    </svg> -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        class="bi bi-trash-fill" viewBox="0 0 16 16">
                        <path
                            d="M2.5 1a1 1 0 0 0-1 1v1a1 1 0 0 0 1 1H3v9a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V4h.5a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H10a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1zm3 4a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0v-7a.5.5 0 0 1 .5-.5M8 5a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0v-7A.5.5 0 0 1 8 5m3 .5v7a.5.5 0 0 1-1 0v-7a.5.5 0 0 1 1 0" />
                    </svg>
                    Reiniciar usuario
                </button>
                <div class="score-history">
                    <h4>Historial de intentos</h4>
                    <ul id="score-history-list" class="score-history-list">
                        <li class="empty-history">Sin intentos registrados</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <div id="share-dialog" class="share-dialog hidden">
        <div class="share-dialog-overlay"></div>
        <div class="share-dialog-content">
            <button id="close-share-dialog" class="close-dialog" title="Cerrar">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
            <div class="share-dialog-header">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path>
                </svg>
                <h3>Compartir Resultado</h3>
            </div>
            <p id="share-dialog-message" class="share-dialog-message"></p>
            <button id="copy-message-btn" class="btn">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                </svg>
                Copiar mensaje
            </button>
        </div>
    </div>

    <script src="js/info.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
